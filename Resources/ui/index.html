<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIK Synth</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="plugin-container">
        <header class="plugin-header">
            <h1>KIK SYNTH</h1>
            <div class="transport-controls">
                <button id="kick-btn" class="btn-transport kick">KICK</button>
                <button id="loop-btn" class="btn-transport loop">LOOP</button>
                <div class="bpm-control">
                    <label>BPM</label>
                    <input type="number" id="bpm" min="80" max="250" value="120">
                </div>
            </div>
        </header>

        <section class="waveform-section">
            <label>WAVEFORM</label>
            <select id="waveform">
                <option value="1">Sine</option>
                <option value="2">Triangle</option>
                <option value="3">Saw</option>
                <option value="4">Square</option>
                <option value="5">Loaded</option>
            </select>
        </section>

        <div class="controls-grid">
            <section class="control-group">
                <h2>PITCH</h2>
                <div class="slider-group">
                    <input type="range" id="pitch" min="40" max="250" value="200">
                    <label class="value-display" id="pitch-val">200 Hz</label>
                </div>
            </section>

            <section class="control-group">
                <h2>DECAY</h2>
                <div class="slider-group">
                    <input type="range" id="pitch-decay" min="0.05" max="0.5" step="0.01" value="0.23">
                    <label class="value-display" id="pitch-decay-val">0.23</label>
                </div>
            </section>

            <section class="control-group full-width">
                <h2>AMPLITUDE</h2>
                <div class="slider-row">
                    <div class="slider-item">
                        <input type="range" id="amp-attack" min="0" max="0.05" step="0.001" value="0.001">
                        <label>ATK</label>
                        <span class="value-display" id="amp-attack-val">0.001</span>
                    </div>
                    <div class="slider-item">
                        <input type="range" id="amp-decay" min="0.05" max="1" step="0.01" value="0.3">
                        <label>DEC</label>
                        <span class="value-display" id="amp-decay-val">0.30</span>
                    </div>
                    <div class="slider-item">
                        <input type="range" id="amp-sustain" min="0" max="1" step="0.01" value="0">
                        <label>SUS</label>
                        <span class="value-display" id="amp-sustain-val">0.00</span>
                    </div>
                    <div class="slider-item">
                        <input type="range" id="amp-release" min="0.05" max="1" step="0.01" value="0.2">
                        <label>REL</label>
                        <span class="value-display" id="amp-release-val">0.20</span>
                    </div>
                </div>
            </section>

            <section class="control-group">
                <h2>DRIVE</h2>
                <div class="slider-group">
                    <input type="range" id="drive" min="0.5" max="3" step="0.01" value="1">
                    <label class="value-display" id="drive-val">1.00</label>
                </div>
            </section>

            <section class="control-group">
                <h2>COLOR</h2>
                <div class="slider-group">
                    <input type="range" id="color" min="0" max="1" step="0.01" value="0.5">
                    <label class="value-display" id="color-val">0.50</label>
                </div>
            </section>

            <section class="control-group">
                <h2>CLICK</h2>
                <div class="slider-group">
                    <input type="range" id="click" min="0" max="1" step="0.01" value="0">
                    <label class="value-display" id="click-val">0.00</label>
                </div>
            </section>

            <section class="control-group">
                <h2>DEPTH</h2>
                <div class="slider-group">
                    <input type="range" id="depth" min="0" max="1" step="0.01" value="0.5">
                    <label class="value-display" id="depth-val">0.50</label>
                </div>
            </section>

            <section class="control-group full-width">
                <h2>GAIN</h2>
                <div class="slider-group">
                    <input type="range" id="gain" min="0" max="1.5" step="0.01" value="1">
                    <label class="value-display" id="gain-val">1.00</label>
                </div>
            </section>
        </div>

        <section class="output-section">
            <div class="waveform-display" id="waveform-preview">
                <canvas id="preview-canvas" width="450" height="80"></canvas>
            </div>
            <div class="meter-section">
                <div class="meter-bar">
                    <div class="meter-fill" id="meter-fill"></div>
                </div>
                <span class="meter-label" id="meter-val">-∞ dB</span>
            </div>
        </section>
    </div>

    <script src="ui.js"></script>
</body>
</html>
