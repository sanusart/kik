<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIK Synth</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="plugin-container">
        <header class="plugin-header">
            <div class="header-left">
                <h1>KIK SYNTH</h1>
            </div>
            <div class="header-right">
                <div class="transport-controls">
                    <button id="kick-btn" class="btn-transport kick">KICK</button>
                    <div class="standalone-only" style="display: flex; align-items: center; gap: 8px;">
                        <button id="loop-btn" class="btn-transport loop">LOOP</button>
                        <div class="bpm-control">
                            <label>BPM</label>
                            <input type="number" id="bpm" min="80" max="250" value="120">
                        </div>
                    </div>
                </div>
                <button id="about-btn" class="btn-icon about">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M11,9H13V7H11M12,20C7.59,20 4,16.41 4,12C4,7.59 7.59,4 12,4C16.41,4 20,7.59 20,12C20,16.41 16.41,20 12,20M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M11,17H13V11H11V17Z"/></svg>
                </button>
            </div>
        </header>

        <section class="waveform-section">
            <label>WAVEFORM</label>
            <div class="waveform-selector" id="waveform">
                <div class="wave-option active" data-val="1">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" d="M2,12 C7,2 10,2 12,12 C14,22 17,22 22,12" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <div class="wave-option" data-val="2">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" d="M2,12 L7,3 L17,21 L22,12" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <div class="wave-option" data-val="3">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" d="M2,12 L12,3 L12,21 L22,12" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <div class="wave-option" data-val="4">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="none" stroke="currentColor" stroke-width="2" d="M2,12 L2,4 L12,4 L12,20 L22,20 L22,12" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
            </div>
        </section>

        <div class="controls-panel">
            <section class="hardware-row">
                <div class="knob-group"><label>PITCH</label><div class="knob-container" id="knob-pitch"><div class="knob-dial"><div class="knob-pointer"></div></div></div><span id="val-pitch" class="value-display">200</span></div>
                <div class="knob-group"><label>P. DECAY</label><div class="knob-container" id="knob-pitch-decay"><div class="knob-dial"><div class="knob-pointer"></div></div></div><span id="val-pitch-decay" class="value-display">0.23</span></div>
                <div class="knob-group"><label>ATTACK</label><div class="knob-container" id="knob-amp-attack"><div class="knob-dial"><div class="knob-pointer"></div></div></div><span id="val-amp-attack" class="value-display">0.00</span></div>
                <div class="knob-group"><label>DECAY</label><div class="knob-container" id="knob-amp-decay"><div class="knob-dial"><div class="knob-pointer"></div></div></div><span id="val-amp-decay" class="value-display">0.30</span></div>
                <div class="knob-group"><label>SUSTAIN</label><div class="knob-container" id="knob-amp-sustain"><div class="knob-dial"><div class="knob-pointer"></div></div></div><span id="val-amp-sustain" class="value-display">0.00</span></div>
                <div class="knob-group"><label>RELEASE</label><div class="knob-container" id="knob-amp-release"><div class="knob-dial"><div class="knob-pointer"></div></div></div><span id="val-amp-release" class="value-display">0.20</span></div>
            </section>

            <section class="hardware-row">
                <div class="knob-group"><label>DRIVE</label><div class="knob-container" id="knob-drive"><div class="knob-dial"><div class="knob-pointer"></div></div></div><span id="val-drive" class="value-display">1.00</span></div>
                <div class="knob-group"><label>COLOR</label><div class="knob-container" id="knob-color"><div class="knob-dial"><div class="knob-pointer"></div></div></div><span id="val-color" class="value-display">0.50</span></div>
                <div class="knob-group"><label>CLICK LVL</label><div class="knob-container" id="knob-click"><div class="knob-dial"><div class="knob-pointer"></div></div></div><span id="val-click" class="value-display">0.00</span></div>
                <div class="knob-group"><label>CLICK PITCH</label><div class="knob-container" id="knob-click-pitch"><div class="knob-dial"><div class="knob-pointer"></div></div></div><span id="val-click-pitch" class="value-display">4000</span></div>
                <div class="knob-group"><label>SUB DEPTH</label><div class="knob-container" id="knob-depth"><div class="knob-dial"><div class="knob-pointer"></div></div></div><span id="val-depth" class="value-display">0.50</span></div>
            </section>

            <section class="hardware-row output-row">
                <div class="knob-group master-gain"><label>GAIN</label><div class="knob-container master-knob" id="knob-gain"><div class="knob-dial"><div class="knob-pointer"></div></div></div><span id="val-gain" class="value-display">1.00</span></div>
                
                <div class="waveform-display" id="waveform-preview">
                    <canvas id="preview-canvas" width="330" height="80"></canvas>
                </div>
                
                <div class="meter-section">
                    <div class="meter-bar">
                        <div class="meter-fill" id="meter-fill"></div>
                    </div>
                    <span class="meter-label" id="meter-val">-∞</span>
                </div>
            </section>
        </div>
        
        <div id="about-overlay" class="overlay hidden">
            <div class="overlay-content">
                <button id="close-about" class="btn-close">&times;</button>
                <div class="about-logo">KIK</div>
                <h2>KIK SYNTH v1.0</h2>
                <p>A professional percussive synthesizer designed for modern electronic music production.</p>
                <p>Developed by <strong>Sanusart</strong></p>
                <div class="about-links">
                    <a href="#" id="website-link">www.sanusart.com</a>
                </div>
                <div class="about-footer">
                    &copy; 2026 Sasha Khamkov
                </div>
            </div>
        </div>
    </div>

    <script src="ui.js"></script>
</body>
</html>
