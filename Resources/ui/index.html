<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIK Synth</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="plugin-container">
        <header class="top-bar">
            <div class="top-left">
                <div class="logo">KIK</div>
                <div class="preset-section">
                    <select id="preset-select" aria-label="Preset" class="preset-dropdown">
                        <option value="" selected>Default</option>
                        <option value="0">Default</option>
                        <option value="1">Sub Layer</option>
                        <option value="2">Club Kick</option>
                        <option value="3">Tight Sidechain</option>
                        <option value="4">Trap Long</option>
                        <option value="5">Punch & Click</option>
                        <option value="6">Warm House</option>
                        <option value="7">Distorted Slam</option>
                        <option value="8">DnB Roller</option>
                        <option value="9">Lo-Fi Thick</option>
                        <option value="10">Big Room</option>
                        <option value="11">Rock Punch</option>
                        <option value="12">Mix Ready</option>
                    </select>
                    <div class="preset-nav">
                        <button type="button" id="preset-prev" class="btn-icon-sm" title="Previous preset">‹</button>
                        <button type="button" id="preset-next" class="btn-icon-sm" title="Next preset">›</button>
                    </div>
                </div>
                <button type="button" id="ab-toggle" class="btn-text-sm">A/B</button>
            </div>
            <div class="top-right">
                <button type="button" id="save-btn" class="btn-text-sm">Save</button>
                <button type="button" id="load-btn" class="btn-text-sm">Load</button>
                <button type="button" id="kick-btn" class="btn-trigger" title="Trigger kick">TRIG</button>
                <button type="button" id="about-btn" class="btn-icon-sm" aria-label="Settings">⚙</button>
            </div>
        </header>

        <div class="main-grid">
            <section class="panel" aria-label="Oscillator and Pitch">
                <div class="panel-header">
                    <h2>OSC + PITCH</h2>
                </div>
                <div class="wave-selector" id="waveform" role="radiogroup" aria-label="Waveform">
                    <button type="button" class="wave-btn active" data-val="1" role="radio" aria-checked="true" title="Sine">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" stroke-width="2" d="M2,12 C7,2 10,2 12,12 C14,22 17,22 22,12"/></svg>
                    </button>
                    <button type="button" class="wave-btn" data-val="2" role="radio" aria-checked="false" title="Triangle">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" stroke-width="2" d="M2,12 L7,3 L17,21 L22,12"/></svg>
                    </button>
                    <button type="button" class="wave-btn" data-val="3" role="radio" aria-checked="false" title="Saw">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" stroke-width="2" d="M2,12 L12,3 L12,21 L22,12"/></svg>
                    </button>
                    <button type="button" class="wave-btn" data-val="4" role="radio" aria-checked="false" title="Square">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" stroke-width="2" d="M2,12 L2,4 L12,4 L12,20 L22,20 L22,12"/></svg>
                    </button>
                </div>
                <div class="key-section">
                    <div class="key-row">
                        <button class="key-note" data-note="0">C</button>
                        <button class="key-note" data-note="1">C#</button>
                        <button class="key-note" data-note="2">D</button>
                        <button class="key-note" data-note="3">D#</button>
                        <button class="key-note" data-note="4">E</button>
                        <button class="key-note" data-note="5">F</button>
                        <button class="key-note" data-note="6">F#</button>
                        <button class="key-note key-active" data-note="7">G</button>
                        <button class="key-note" data-note="8">G#</button>
                        <button class="key-note" data-note="9">A</button>
                        <button class="key-note" data-note="10">A#</button>
                        <button class="key-note" data-note="11">B</button>
                    </div>
                    <div class="octave-row">
                        <button type="button" class="oct-btn" id="key-oct-down">−</button>
                        <span class="oct-value" id="key-oct-display">3</span>
                        <button type="button" class="oct-btn" id="key-oct-up">+</button>
                    </div>
                </div>
                <!-- Pitch + Fine on same row -->
                <div class="knobs-row">
                    <div class="knob-group">
                        <label>Pitch</label>
                        <div class="knob-container" id="knob-pitch" data-default="196"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-pitch">196 Hz</span>
                    </div>
                    <div class="knob-group">
                        <label>Fine</label>
                        <div class="knob-container" id="knob-fine" data-default="0"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-fine">0</span>
                    </div>
                </div>
                <!-- Decay + Curve on same row -->
                <div class="knobs-row">
                    <div class="knob-group">
                        <label>Decay</label>
                        <div class="knob-container" id="knob-pitch-decay" data-default="0.23"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-pitch-decay">0.23</span>
                    </div>
                    <div class="knob-group">
                        <label>Curve</label>
                        <div class="knob-container" id="knob-pitch-curve" data-default="0.50"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-pitch-curve">0.50</span>
                    </div>
                </div>
            </section>

            <section class="panel" aria-label="Transient">
                <div class="panel-header">
                    <h2>TRANSIENT</h2>
                </div>
                <!-- Attack + Snap on same row -->
                <div class="knobs-row">
                    <div class="knob-group">
                        <label>Attack</label>
                        <div class="knob-container" id="knob-amp-attack" data-default="0.001"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-amp-attack">1.0 ms</span>
                    </div>
                    <div class="knob-group">
                        <label>Snap</label>
                        <div class="knob-container" id="knob-click" data-default="0"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-click">0.00</span>
                    </div>
                </div>
                <!-- Length + Click Pit on same row -->
                <div class="knobs-row">
                    <div class="knob-group">
                        <label>Length</label>
                        <div class="knob-container" id="knob-amp-decay" data-default="0.30"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-amp-decay">300 ms</span>
                    </div>
                    <div class="knob-group">
                        <label>Click Pit</label>
                        <div class="knob-container" id="knob-click-pitch" data-default="4000"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-click-pitch">4000</span>
                    </div>
                </div>
                <div class="knobs-row">
                    <div class="knob-group">
                        <label>Sub Dep</label>
                        <div class="knob-container" id="knob-depth" data-default="0.50"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-depth">0.50</span>
                    </div>
                </div>
                <div class="slider-row">
                    <label for="slider-amp-sustain">Sustain</label>
                    <input type="range" id="slider-amp-sustain" min="0" max="1" step="0.01" value="0">
                    <span class="value-readout" id="val-amp-sustain">0%</span>
                </div>
                <div class="slider-row">
                    <label for="slider-amp-release">Release</label>
                    <input type="range" id="slider-amp-release" min="0.05" max="1" step="0.01" value="0.20">
                    <span class="value-readout" id="val-amp-release">200 ms</span>
                </div>
            </section>

            <section class="panel" aria-label="Drive and Tone">
                <div class="panel-header">
                    <h2>DRIVE + TONE</h2>
                </div>
                <div class="drive-type-selector">
                    <button type="button" class="drive-btn active" data-val="0">Soft</button>
                    <button type="button" class="drive-btn" data-val="1">Hard</button>
                    <button type="button" class="drive-btn" data-val="2">Asym</button>
                </div>
                <!-- Drive + Color on same row -->
                <div class="knobs-row">
                    <div class="knob-group">
                        <label>Drive</label>
                        <div class="knob-container" id="knob-drive" data-default="1.0"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-drive">1.00</span>
                    </div>
                    <div class="knob-group">
                        <label>Color</label>
                        <div class="knob-container" id="knob-color" data-default="0.50"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-color">0.50</span>
                    </div>
                </div>
                <!-- Tilt + HP on same row -->
                <div class="knobs-row">
                    <div class="knob-group">
                        <label>Tilt</label>
                        <div class="knob-container" id="knob-wave-morph" data-default="0"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-wave-morph">0.00</span>
                    </div>
                    <div class="knob-group">
                        <label>HP</label>
                        <div class="knob-container" id="knob-hp" data-default="35"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-hp">35 Hz</span>
                    </div>
                </div>
                <!-- LP on its own row for clarity -->
                <div class="knobs-row">
                    <div class="knob-group">
                        <label>LP</label>
                        <div class="knob-container" id="knob-lp" data-default="20000"><div class="knob-dial"><div class="knob-pointer"></div></div></div>
                        <span class="value-readout" id="val-lp">20 kHz</span>
                    </div>
                </div>
            </section>
        </div>

        <!-- Bottom: Envelope + Output side by side -->
        <div class="bottom-section">
            <div class="envelope-editor" aria-label="Envelope editor">
                <div class="panel-header">
                    <h2>ENVELOPE</h2>
                    <div class="env-toggle">
                        <button type="button" class="env-btn active" data-mode="amp">AMP</button>
                        <button type="button" class="env-btn" data-mode="pitch">PITCH</button>
                    </div>
                </div>
                <div class="waveform-display">
                    <canvas id="preview-canvas" width="410" height="120"></canvas>
                </div>
            </div>

            <div class="output-section" aria-label="Output">
                <div class="panel-header">
                    <h2>OUTPUT</h2>
                </div>
                <div class="output-controls">
                    <!-- Gain + Enhance on same row -->
                    <div class="knobs-row">
                        <div class="knob-group">
                            <label>Gain</label>

                        <div class="knob-container small" id="knob-gain" data-default="1.0"><div class="knob-dial small"><div class="knob-pointer"></div></div></div>
                            <span class="value-readout" id="val-gain">1.00</span>
                        </div>
                        <div class="knob-group">
                            <label>Enhance</label>
                            <div class="knob-container small" id="knob-enhancer" data-default="0"><div class="knob-dial small"><div class="knob-pointer"></div></div></div>
                            <span class="value-readout" id="val-enhancer">0.00</span>
                        </div>
                    </div>
                    <div class="output-toggles">
                        <button type="button" id="limiter-toggle" class="toggle-btn" aria-pressed="false">LIM</button>
                        <button type="button" id="loop-toggle" class="toggle-btn" aria-pressed="false">LOOP</button>
                        <div class="pill-group">
                            <label>OS</label>
                            <select id="oversample-select" class="oversample-dropdown">
                                <option value="0">1x</option>
                                <option value="1">2x</option>
                                <option value="2">4x</option>
                            </select>
                        </div>
                        <div class="pill-group bpm">
                            <label>BPM</label>
                            <span class="bpm-value" id="bpm-display">120</span>
                            <button type="button" class="bpm-btn-sm" id="bpm-down">−</button>
                            <button type="button" class="bpm-btn-sm" id="bpm-up">+</button>
                        </div>
                    </div>
                </div>
                <div class="meter-section">
                    <div class="meter-label">PEAK</div>
                    <div class="meter-track">
                        <div class="meter-bar">
                            <div class="meter-fill" id="meter-fill"></div>
                        </div>
                        <div class="meter-labels">
                            <span>0</span><span>−15</span><span>−30</span><span>−45</span><span>−60</span>
                        </div>
                    </div>
                    <div class="meter-value mono" id="meter-val">−∞ dB</div>
                    <div class="clip-indicator" id="clip-indicator">CLIP</div>
                </div>
            </div>
        </div>

        <div id="about-overlay" class="overlay hidden">
            <div class="overlay-content">
                <button type="button" id="close-about" class="btn-close">×</button>
                <div class="about-logo">KIK</div>
                <h2>KIK SYNTH v1.0</h2>
                <p>A professional kick drum synthesizer</p>
                <p><strong>Sanusart</strong></p>
                <div class="about-footer">© 2026 Sasha Khamkov</div>
            </div>
        </div>
    </div>
    <script src="ui.js"></script>
</body>
</html>
